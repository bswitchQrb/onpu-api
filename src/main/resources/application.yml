spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/onpu}
    username: ${DATABASE_USERNAME:onpu}
    password: ${DATABASE_PASSWORD:onpu}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:onpu-dev-secret-key-change-in-production-at-least-256-bits-long!!}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
