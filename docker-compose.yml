services:
  mysql:
    image: mysql:8.0
    container_name: onpu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onpu
      MYSQL_USER: onpu
      MYSQL_PASSWORD: onpu
    ports:
      - "3307:3306"
    volumes:
      - onpu-mysql-data:/var/lib/mysql

volumes:
  onpu-mysql-data:
