name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: onpu
          POSTGRES_USER: onpu
          POSTGRES_PASSWORD: onpu
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U onpu"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build and test
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/onpu
          DATABASE_USERNAME: onpu
          DATABASE_PASSWORD: onpu
          JWT_SECRET: test-secret-key-for-ci-at-least-256-bits-long-enough!!
          CORS_ALLOWED_ORIGINS: http://localhost:5173
        run: ./gradlew build
